<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Font Awesome -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <!-- Goole Font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Libre+Baskerville:ital,wght@0,400..700;1,400..700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="./style.css" />
    <title>Todo App</title>
  </head>
  <body>
    <div class="container">
      <!-- Sidebar -->
      <div class="sidebar">
        <div class="header">
          <h1><i class="fas fa-tasks"></i>TaskMaster Pro</h1>
        </div>
        <div class="input-section">
          <input
            type="text"
            id="todoTitle"
            placeholder="What's your next big task?"
          />
          <textarea
            placeholder="Add details about your task"
            id="todoDesc"
          ></textarea>
          <button class="btn" id="addBtn">
            Create Task
            <i class="fas fa-plus"></i>
          </button>
        </div>
      </div>
      <!-- MainContent -->
      <div class="main-content">
        <div class="header">
          <h2>Your Task Overview</h2>
          <!-- Todo List Container -->
          <div id="todoList">
            <!-- Todo items will add here -->
            <!-- Add todo manually-->
          </div>
        </div>
      </div>
    </div>
    <script src="./app.js"></script>
  </body>
</html>
